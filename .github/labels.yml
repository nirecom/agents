# Label definitions for GitHub Issues.
# Applied via `bin/github-issues/sync-labels.sh` (uses `gh label create --force`).
# Format: list of {name, color, description}. Colors are 6-digit hex without '#'.

- name: "type:task"
  color: "0e8a16"
  description: "Normal work item. Closes to a FEATURE entry in history.md."

- name: "type:incident"
  color: "d93f0b"
  description: "Incident or bug. Closes to an INCIDENT entry in history.md."

- name: "status:cancelled"
  color: "bfbfbf"
  description: "Cancelled without completion. Applied after close."

- name: "status:migrated"
  color: "5319e7"
  description: "Merged into another issue. Applied after close."

- name: "intent:clarified"
  color: "1d76db"
  description: "Issue body ratified via /clarify-intent. /workflow-init Path A skips the interview."

- name: "meta"
  color: "e4e669"
  description: "Planning/architecture issue with no implementation. Sub-issues carry the actual work."

# --- Severity ---
- name: "severity:high"
  color: "b60205"
  description: "Fatal: workflow stops, abort, infinite loop, security hole, or major feature impact"

- name: "severity:low"
  color: "c5def5"
  description: "Cosmetic or safely deferrable; no label = normal severity"

# --- Model ---
- name: "model:fable"
  color: "e99695"
  description: "Issue is specific to or observed with Fable"

- name: "model:opus"
  color: "d4c5f9"
  description: "Issue is specific to or observed with Claude Opus"

- name: "model:sonnet"
  color: "bfd4f2"
  description: "Issue is specific to or observed with Claude Sonnet"

- name: "model:ds4"
  color: "f9d0c4"
  description: "Issue is specific to or observed with DeepSeek v4"

- name: "model:others"
  color: "eeeeee"
  description: "Issue is specific to a model not covered by other model:* labels"
